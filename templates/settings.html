<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: auto; display: flex; flex-direction: column; min-height: 100vh; }
        .nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 20px; background: #111; border-bottom: 1px solid #333; flex-shrink: 0; }
        .nav-left { display: flex; gap: 12px; }
        .nav a { display: inline-block; padding: 14px 28px; background: #333; color: #ff9f0a; text-decoration: none; font-size: 20px; font-weight: bold; border-radius: 8px; }
        .nav a:hover, .nav a.active { background: #ff9f0a; color: #000; }
        .nav .nav-settings { margin-left: auto; padding: 14px; }
        .nav .nav-settings svg { width: 28px; height: 28px; vertical-align: middle; }
        .content { flex: 1; padding: 20px; max-width: 600px; }
        .content h1 { color: #ff9f0a; font-size: 24px; margin: 0 0 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #888; font-size: 14px; margin-bottom: 6px; text-transform: uppercase; }
        .form-group input[type="text"],
        .form-group input[type="number"] { width: 100%; max-width: 280px; padding: 10px 12px; font-size: 16px; background: #222; border: 1px solid #444; border-radius: 6px; color: #fff; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #ff9f0a; }
        .form-group .hint { color: #666; font-size: 12px; margin-top: 4px; }
        .form-group.checkbox { display: flex; align-items: center; gap: 10px; }
        .form-group.checkbox input { width: 22px; height: 22px; accent-color: #ff9f0a; cursor: pointer; }
        .form-group.checkbox label { margin-bottom: 0; text-transform: none; cursor: pointer; }
        .form-group.radios label { display: block; margin: 8px 0; }
        .form-group.radios input { margin-right: 8px; accent-color: #ff9f0a; }
        .actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
        .actions button { padding: 14px 24px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-save { background: #333; color: #ff9f0a; }
        .btn-save:hover { background: #444; }
        .btn-refresh { background: #ff9f0a; color: #000; }
        .btn-refresh:hover { background: #ffb340; }
        .msg { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; }
        .msg.success { background: #1a2e1a; color: #8f8; border: 1px solid #2a4a2a; }
        .msg.error { background: #2e1a1a; color: #f88; border: 1px solid #4a2a2a; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <a href="/">Home</a>
            <a href="/5day">5 Day</a>
            <a href="/ha">Controls</a>
        </div>
        <a href="/settings" class="nav-settings active" title="Settings" aria-label="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </a>
    </nav>
    <div class="content">
        <h1>Settings</h1>
        <form id="settings-form">
            <div class="form-group">
                <label for="location_name">Location city name</label>
                <input type="text" id="location_name" name="location_name" value="{{ location_name }}" placeholder="e.g. Veneta">
                <div class="hint">Shown on the dashboard as &quot;{{ location_name or 'Location' }} Forecast&quot;</div>
            </div>
            <div class="form-group">
                <label for="latitude">Latitude</label>
                <input type="number" id="latitude" name="latitude" step="any" value="{{ latitude if latitude is not none else '' }}" placeholder="e.g. 44.05">
                <div class="hint">Used for local weather and forecast (Wunderground/Weather.com)</div>
            </div>
            <div class="form-group">
                <label for="longitude">Longitude</label>
                <input type="number" id="longitude" name="longitude" step="any" value="{{ longitude if longitude is not none else '' }}" placeholder="e.g. -123.35">
            </div>
            <div class="form-group checkbox">
                <input type="checkbox" id="vevor_enabled" name="vevor_enabled" {% if vevor_enabled %}checked{% endif %}>
                <label for="vevor_enabled">Enable Vevor / personal weather station</label>
            </div>
            <div class="form-group hint">When disabled, current &quot;Outside&quot; conditions use your latitude/longitude instead.</div>
            <div class="form-group checkbox">
                <input type="checkbox" id="screensaver_enabled" name="screensaver_enabled" {% if screensaver_enabled %}checked{% endif %}>
                <label for="screensaver_enabled">Enable screensaver</label>
            </div>
            <div class="form-group">
                <label for="screensaver_timeout_sec">Screensaver timeout (seconds)</label>
                <input type="number" id="screensaver_timeout_sec" name="screensaver_timeout_sec" min="10" value="{{ screensaver_timeout_sec }}">
                <div class="hint">Idle time before screensaver starts (minimum 10)</div>
            </div>
            <div class="form-group radios">
                <label>Screensaver type</label>
                <label><input type="radio" name="screensaver_type" value="black" {% if screensaver_type == 'black' %}checked{% endif %}> Black screen</label>
                <label><input type="radio" name="screensaver_type" value="rainbow_ball" {% if screensaver_type == 'rainbow_ball' %}checked{% endif %}> Rainbow ball</label>
                <label><input type="radio" name="screensaver_type" value="weather_quote" {% if screensaver_type == 'weather_quote' %}checked{% endif %}> Random weather quote</label>
            </div>
            <div class="actions">
                <button type="submit" class="btn-save" id="btn-save">Save</button>
                <button type="button" class="btn-refresh" id="btn-refresh">Save and refresh kiosk</button>
            </div>
        </form>
        <div id="msg" class="msg" style="display: none;"></div>
    </div>
    <script>
(function() {
    var form = document.getElementById('settings-form');
    var msgEl = document.getElementById('msg');
    var btnRefresh = document.getElementById('btn-refresh');

    function getPayload() {
        var lat = document.getElementById('latitude').value;
        var lon = document.getElementById('longitude').value;
        return {
            location_name: (document.getElementById('location_name').value || '').trim(),
            latitude: lat === '' ? null : parseFloat(lat),
            longitude: lon === '' ? null : parseFloat(lon),
            vevor_enabled: document.getElementById('vevor_enabled').checked,
            screensaver_enabled: document.getElementById('screensaver_enabled').checked,
            screensaver_timeout_sec: parseInt(document.getElementById('screensaver_timeout_sec').value, 10) || 180,
            screensaver_type: (form.querySelector('input[name="screensaver_type"]:checked') || {}).value || 'rainbow_ball'
        };
    }

    function showMsg(text, isError) {
        msgEl.textContent = text;
        msgEl.className = 'msg ' + (isError ? 'error' : 'success');
        msgEl.style.display = 'block';
    }

    function save(andRefresh) {
        var payload = getPayload();
        fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) {
            if (!r.ok) return r.json().then(function(j) { throw new Error(j.error || r.statusText); });
            return r.json();
        }).then(function() {
            showMsg('Settings saved.');
            if (andRefresh) {
                window.location.href = '/';
            }
        }).catch(function(e) {
            showMsg('Error: ' + e.message, true);
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        save(false);
    });
    btnRefresh.addEventListener('click', function() {
        save(true);
    });
})();
    </script>
</body>
</html>
